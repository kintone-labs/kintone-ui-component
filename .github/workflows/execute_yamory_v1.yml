name: execute yamory when pushing to v1

on:
  push:
    branches: [master]

jobs:
  check_master:
    name: execute yamory on master branch
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
    - name: Install node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: pnpm
    - uses: ./.github/actions/setup_takumi_guard_npm
      with:
        bot-id: ${{ vars.TAKUMI_GUARD_BOT_ID }}
    - name: run Yamory
      run: |
        ls -1 -d docs/*/ | xargs -I {} bash -c "$(curl -sSf -L https://localscanner.yamory.io/script/pnpm)" --  --manifest {}/package.json
        ls -1 -d demos/*/ | xargs -I {} bash -c "$(curl -sSf -L https://localscanner.yamory.io/script/pnpm)" --  --manifest {}/package.json
        bash -c "$(curl -sSf -L https://localscanner.yamory.io/script/pnpm)"
      env:
        CI: true
        PROJECT_GROUP_KEY: kintone-ui-component_master
        YAMORY_API_KEY: ${{ secrets.YAMORY_API_KEY }}