name: Takumi Guard smoke test

on:
  push:
    branches:
      - SSR-6003_Update-CI-to-support-Takumi-Guard

jobs:
  guard-smoke:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Takumi Guard
        id: guard
        uses: flatt-security/setup-takumi-guard-npm@8f53b50568e4466f2d92504f349c05b9ffcb8b59
        with:
          bot-id: ${{ vars.TAKUMI_GUARD_BOT_ID }}

      - name: Verify registry is set (project)
        run: |
          reg="$(npm config get registry --location=project)"
          echo "registry=$reg"
          test "$reg" = "https://npm.flatt.tech/"

      - name: Verify auth token is configured (without printing it)
        run: |
          test -f .npmrc
          # Check key exists, but do not print token value.
          grep -q '^//npm\.flatt\.tech/:_authToken=' .npmrc
          echo ".npmrc has auth token entry for npm.flatt.tech"

      - name: Verify Guard output exists
        run: |
          test -n "${{ steps.guard.outputs.token-expires-at }}"
          echo "token-expires-at=${{ steps.guard.outputs.token-expires-at }}"

      - name: Install dependencies through Guard
        run: npm install
