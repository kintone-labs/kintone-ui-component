# Wraps the upstream action so the pinned commit SHA is maintained in one file.
# Upstream: https://github.com/flatt-security/setup-takumi-guard-npm
name: Setup Takumi Guard npm
description: Authenticate to the Takumi Guard npm registry (wrapped for single-SHA pin)
runs:
  using: composite
  steps:
    - name: flatt-security/setup-takumi-guard-npm
      uses: flatt-security/setup-takumi-guard-npm@8f53b50568e4466f2d92504f349c05b9ffcb8b59
      with:
        bot-id: ${{ vars.TAKUMI_GUARD_BOT_ID }}
